# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ttrpg-tool-test

on:
  push:
    branches:
      - testing/deploy
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://ttrpgcr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_09e1c98032d740cfab3442839f8ad438 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_3a9e7b3b28cd4d1da2e8388acc162616 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: ttrpgcr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_09e1c98032d740cfab3442839f8ad438 }}/ttrpg-testing:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ttrpg-tool-test'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_ad29454181be4953a63f2059fd78cfbf }}
        images: 'ttrpgcr.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_09e1c98032d740cfab3442839f8ad438 }}/ttrpg-testing:${{ github.sha }}'